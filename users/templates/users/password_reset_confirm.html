{% extends 'blog/base.html' %}

{% block title %}
  Password Reset
{% endblock %}

{% block content %}
  <h1>Password Reset</h1>
  <form method="post" class="form-register auth">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-danger" type="submit">Reset password</button>
  </form>
{% endblock %}
