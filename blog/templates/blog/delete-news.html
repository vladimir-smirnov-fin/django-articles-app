{% extends 'blog/base.html' %}

{% block title %}
  Delete Article
{% endblock %}

{% block content %}
  <h1>Are you sure you want to delete the article "{{ object.title }}"?</h1>
  <form method="post" class="form-register auth">
    {% csrf_token %}
    <button class="btn btn-outline-danger" type="submit">Yes, delete</button>
    <a href="{% url 'news-detail' object.id %}">No, cancel</a>
  </form>
{% endblock %}
